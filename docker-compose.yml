services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mi_password_root_123
      MYSQL_DATABASE: ukesync_db
      MYSQL_USER: ukesync_user
      MYSQL_PASSWORD: mi_password_user_456
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: saronni/ukeintavula-api:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ukesync_db
      DB_USER: ukesync_user
      DB_PASSWORD: mi_password_user_456
      ADMIN_PASS: more2000
      SERVE_DIR: /app/public
      CACHE_DIR: /tmp/ukesync_cache
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  db_data:
